upstream pulse_radio {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Rate limiting zone: 10 req/s per IP, burst 20
limit_req_zone $binary_remote_addr zone=pulse_limit:10m rate=10r/s;

server {
    listen 80;
    server_name pulse-radio.online www.pulse-radio.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pulse-radio.online www.pulse-radio.online;

    # SSL (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/pulse-radio.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulse-radio.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers (complement app-level CSP from ARCH-031)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Immutable cache for Next.js static assets
    location /_next/static/ {
        proxy_pass http://pulse_radio;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files
    location /static/ {
        proxy_pass http://pulse_radio;
        add_header Cache-Control "public, max-age=86400";
    }

    # Rate-limited API routes
    location /api/ {
        limit_req zone=pulse_limit burst=20 nodelay;
        proxy_pass http://pulse_radio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default proxy
    location / {
        proxy_pass http://pulse_radio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
